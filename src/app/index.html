<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Am I - Player Dashboard</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-accent: #FFD700;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
        }

        .hidden {
            display: none !important;
        }

        /* Lobby */
        #lobbyView {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .lobby-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        .room-code-display {
            font-size: 4rem;
            letter-spacing: 5px;
            color: var(--text-accent);
            margin: 20px 0;
            font-family: 'Outfit', sans-serif;
        }

        .player-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .player-list li {
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        button.btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 1.2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            background: var(--primary);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }

        button.btn-primary:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Active Game */
        #activeView {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        #topArea {
            flex: 0 0 auto;
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--card-border);
            overflow-x: auto;
            align-items: center;
        }

        .other-player-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            min-width: 150px;
        }

        .other-player-card img {
            width: 150px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .other-player-card .name {
            margin-top: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-accent);
        }

        #bottomArea {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            flex-direction: column;
            width: 100%;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px;
            font-size: 1rem;
            border-radius: 8px;
            background: #222;
            color: white;
            border: 1px solid #555;
            outline: none;
        }

        #playerCardGrid {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            overflow-y: auto;
            flex: 1;
            align-content: flex-start;
        }

        .guess-card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 12px;
            border: 2px solid transparent;
            width: 140px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .guess-card:hover {
            border-color: var(--text-accent);
        }

        .guess-card.wrong {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Game Over */
        #gameOverView {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .winner-text {
            font-size: 3rem;
            color: var(--text-accent);
            margin-bottom: 30px;
            text-align: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.03);
            padding: 8px 12px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .filter-label {
            font-weight: bold;
            color: var(--text-accent);
            white-space: nowrap;
        }

        .filter-toggles {
            display: flex;
            flex-wrap: nowrap;
            gap: 5px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filter-toggles::-webkit-scrollbar {
            display: none;
        }

        .toggle-btn {
            background: #222;
            border: 1px solid #555;
            color: white;
            padding: 5px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .toggle-btn:hover {
            border-color: #888;
        }

        .toggle-btn.active {
            background: var(--primary);
            border-color: var(--primary-hover);
            color: white;
            font-weight: bold;
        }

        #cardTooltip {
            position: fixed;
            display: none;
            z-index: 9999;
            pointer-events: none;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.8);
            padding: 5px;
        }

        #cardTooltip img {
            max-height: 400px;
            max-width: 280px;
            width: auto;
            border-radius: 8px;
            display: block;
        }

        .invite-section {
            margin: 15px 0 25px 0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .invite-section input {
            flex: 1;
            padding: 10px 15px;
            font-size: 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            color: var(--text-muted);
            outline: none;
            user-select: all;
        }

        .invite-section button {
            padding: 10px 15px;
            font-size: 1rem;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .invite-section button:hover {
            background: var(--primary);
            color: white;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 10000;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body>
    <!-- Lobby View -->
    <div id="lobbyView" class="hidden">
        <div class="lobby-box">
            <h2>Who Am I - Lorcana</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">Waiting for players to join this Activity...</p>

            <h3>Players Joined</h3>
            <ul class="player-list" id="lobbyPlayers"></ul>
            <button class="btn-primary" id="startGameBtn" onclick="startGame()" disabled>Start Game (Need 2+)</button>
        </div>

    <!-- Active Game View -->

        <!-- Other players' cards -->
        <div id="topArea"></div>

        <!-- My guessing area -->

            <div class="filter-bar">

                    <button class="btn-secondary" id="advancedFiltersBtn" onclick="toggleAdvancedFilters()"

                        ▼</button>
                </div>

                <div id="advancedFiltersPanel"
                    style="display: none; flex-wrap: wrap; gap: 15px; width: 100%; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--card-border); box-sizing: border-box; max-height: 40vh; overflow-y: auto; margin-bottom: 10px;">
                    <div class="filter-group">

                            <button class="toggle-btn color-toggle" data-val="Ruby">Ruby</button>
                            <button class="toggle-btn color-toggle" data-val="Sapphire">Sapphire</button>
                            <button class="toggle-btn color-toggle" data-val="Steel">Steel</button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <div class="filter-label">Cost</div>
                        <div class="filter-toggles" id="costToggles">
                            <button class="toggle-btn cost-toggle" data-val="0">0</button>
                            <button class="toggle-btn cost-toggle" data-val="1">1</button>
                            <button class="toggle-btn cost-toggle" data-val="2">2</button>
                            <button class="toggle-btn cost-toggle" data-val="3">3</button>
                            <button class="toggle-btn cost-toggle" data-val="4">4</button>
                            <button class="toggle-btn cost-toggle" data-val="5">5</button>
                            <button class="toggle-btn cost-toggle" data-val="6">6</button>
                            <button class="toggle-btn cost-toggle" data-val="7">7</button>
                            <button class="toggle-btn cost-toggle" data-val="8">8</button>
                            <button class="toggle-btn cost-toggle" data-val="9+">9+</button>
                        </div>
                    </div>
                    <div class="filter-group">
                        <div class="filter-label">Type</div>
                        <div class="filter-toggles" id="typeToggles">

                            <button class="toggle-btn type-toggle" data-val="item">Item</button>
                            <button class="toggle-btn type-toggle" data-val="action">Action</button>
                            <button class="toggle-btn type-toggle" data-val="location">Location</button>

                    </div>
                    <div class="filter-group">
                        <div class="filter-label">Rarity</div>
                        <div class="filter-toggles" id="rarityToggles">

                            <button class="toggle-btn rarity-toggle" data-val="uncommon">Uncommon</button>

                    </div>

                        <div class="filter-label">Inkable</div>

                    <div class="filter-group">

                            <button class="toggle-btn willpower-toggle" data-val="2">2</button>

                            <button class="toggle-btn willpower-toggle" data-val="4">4</button>
                            <button class="toggle-btn willpower-toggle" data-val="5">5</button>
                            <button class="toggle-btn willpower-toggle" data-val="6">6</button>
                            <button class="toggle-btn willpower-toggle" data-val="7">7</button>
                            <button class="toggle-btn willpower-toggle" data-val="8">8</button>

                        <div class="filter-toggles" id="setToggles">

                            <button class="toggle-btn set-toggle" data-val="002">Rise of the Floodborn</button>

                            <button class="toggle-btn set-toggle" data-val="004">Ursula's Return</button>
                            <button class="toggle-btn set-toggle" data-val="005">Shimmering Skies</button>
                            <button class="toggle-btn set-toggle" data-val="006">Azurite Sea</button>
                            <button class="toggle-btn set-toggle" data-val="007">Archazia's Island</button>

    <!-- Game Over View -->
    <div id="gameOverView" class="hidden">
        <div class="lobby-box">
            <div class="winner-text" id="winnerText"></div>
            <div style="margin-bottom: 20px;" id="scoreboardList"></div>
            <button class="btn-primary" onclick="playAgain()">Return to Lobby</button>
        </div>
    </div>

    <div id="cardTooltip"><img src="" id="tooltipImg"></div>

    <script type="module">
        import { DiscordSDK } from '@discord/embedded-app-sdk';
        import { patch } from '@robojs/patch';

        patch(); // Patch fetch/websocket for Discord proxy

        let discordSdk;
        let auth;
        let myId;
        let myName;
        let myAvatar;
        let room;

        const socket = io({ transports: ['websocket'] }); // Force websocket for proxy

        async function setupDiscord() {
            try {
                discordSdk = new DiscordSDK(import.meta.env.VITE_DISCORD_CLIENT_ID);
                await discordSdk.ready();
                room = discordSdk.instanceId;

                const { code } = await discordSdk.commands.authorize({
                    client_id: import.meta.env.VITE_DISCORD_CLIENT_ID,
                    response_type: "code",
                    state: "",
                    prompt: "none",
                    scope: ["identify"]
                });

                const response = await fetch('/api/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });
                
                const { access_token } = await response.json();
                auth = await discordSdk.commands.authenticate({ access_token });
                
                myId = auth.user.id;
                myName = auth.user.username;
                myAvatar = auth.user.avatar ? `https://cdn.discordapp.com/avatars/${auth.user.id}/${auth.user.avatar}.png` : null;

                socket.emit('join_game', { roomCode: room, id: myId, name: myName, avatar: myAvatar });
            } catch (err) {
                console.error("Discord SDK Setup Failed:", err);
                // Fallback for local browser testing without Discord
                myId = Math.random().toString(36).substring(2, 11);
                myName = "Local Player " + myId.substring(0,4);
                room = "LOCAL_ROOM";
                socket.emit('join_game', { roomCode: room, id: myId, name: myName, avatar: null });
            }
        }

        setupDiscord();

        let allPlayerCards = [];
        let currentFiltered = [];
        let displayLimit = 150;
        let guessedWrongCards = new Set();

        fetch('/api/cards-summary').then(r => r.json()).then(d => {
            allPlayerCards = d;

            // Setup toggles
            document.querySelectorAll('.toggle-btn').forEach(btn => {
                btn.addEventListener('click', function () {
                    this.classList.toggle('active');
                    filterPlayerCards();
                });
            });

            document.getElementById('playerCardGrid').addEventListener('scroll', function () {
                if (this.scrollTop + this.clientHeight >= this.scrollHeight - 300) {
                    if (displayLimit < currentFiltered.length) {
                        const start = displayLimit;
                        displayLimit += 150;
                        renderCards(start, displayLimit, false);
                    }
                }
            });

            if (document.getElementById('playerCardGrid').innerHTML === '') filterPlayerCards();
        });

        // Tooltip logic
        const tooltip = document.getElementById('cardTooltip');
        const tooltipImg = document.getElementById('tooltipImg');

        function showTooltip(e, url) {
            tooltipImg.src = url;
            tooltip.style.display = 'block';
            moveTooltip(e);
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        function moveTooltip(e) {
            if (tooltip.style.display === 'none') return;
            let x = e.clientX + 20;
            let y = e.clientY + 20;

            if (x + 280 > window.innerWidth) x = e.clientX - 300;
            if (y + 420 > window.innerHeight) y = window.innerHeight - 420;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function showView(id) {
            ['lobbyView', 'activeView', 'gameOverView'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function startGame() {
            socket.emit('start_game', { roomCode: room });
        }

        function playAgain() {
            socket.emit('play_again', { roomCode: room });
        }

        function guessWhoAmICard(cardId) {
            if (confirm("Are you sure you want to guess this card?")) {
                socket.emit('who_am_i_guess', { roomCode: room, playerId: myId, guessCardId: cardId });
            }
        }

        socket.on('wrong_guess', (cardId) => {
            guessedWrongCards.add(cardId);
            const el = document.querySelector(`.guess-card[data-card-id="${cardId}"]`);
            if (el) {
                el.classList.add('wrong');
                el.onclick = null;
                el.onmouseenter = null;
                el.onmousemove = null;
                hideTooltip();
            }
            alert("Incorrect guess! The card has been greyed out.");
        });

        function renderCards(start, end, clear = true) {
            const grid = document.getElementById('playerCardGrid');
            if (clear) grid.innerHTML = '';

            currentFiltered.slice(start, end).forEach(c => {
                const isGuessed = guessedWrongCards.has(c.id);
                const div = document.createElement('div');
                div.className = `guess-card ${isGuessed ? 'wrong' : ''}`;
                div.setAttribute('data-card-id', c.id);

                if (!isGuessed) {
                    div.onclick = () => guessWhoAmICard(c.id);
                    div.onmouseenter = (e) => showTooltip(e, c.image_url);
                    div.onmousemove = moveTooltip;
                    div.onmouseleave = hideTooltip;
                }

                div.innerHTML = `<img src="${c.image_url}" loading="lazy" style="width: 140px; height: 196px; border-radius: 8px;">
                <div style="font-size: 0.9rem; text-align: center; margin-top: 5px; font-weight: bold; width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.name}</div>
                <div style="font-size: 0.7rem; text-align: center; color: var(--text-muted); width: 140px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${c.title}</div>`;
                grid.appendChild(div);
            });
        }

        function filterPlayerCards() {
            const search = document.getElementById('playerCardSearch').value.toLowerCase();

            const selectedColors = Array.from(document.querySelectorAll('.color-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedCosts = Array.from(document.querySelectorAll('.cost-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedTypes = Array.from(document.querySelectorAll('.type-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedRarities = Array.from(document.querySelectorAll('.rarity-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedInks = Array.from(document.querySelectorAll('.ink-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedLores = Array.from(document.querySelectorAll('.lore-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedStrengths = Array.from(document.querySelectorAll('.strength-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedWillpowers = Array.from(document.querySelectorAll('.willpower-toggle.active')).map(el => el.getAttribute('data-val'));
            const selectedSets = Array.from(document.querySelectorAll('.set-toggle.active')).map(el => el.getAttribute('data-val'));

            currentFiltered = allPlayerCards.filter(c => {
                if (search && !c.name.toLowerCase().includes(search) && !(c.title && c.title.toLowerCase().includes(search))) return false;

                if (selectedColors.length > 0 && !selectedColors.includes(c.color)) return false;

                if (selectedCosts.length > 0) {
                    if (c.cost == null) return false;
                    if (c.cost >= 9) {
                        if (!selectedCosts.includes('9+')) return false;
                    } else {
                        if (!selectedCosts.includes(c.cost.toString())) return false;
                    }
                }

                if (selectedTypes.length > 0 && !selectedTypes.includes(c.type)) return false;

                if (selectedRarities.length > 0 && !selectedRarities.includes(c.rarity)) return false;

                if (selectedInks.length > 0) {
                    if (c.ink == null) return false;
                    if (!selectedInks.includes(c.ink.toString())) return false;
                }

                if (selectedLores.length > 0) {
                    if (c.lore == null) return false;
                    if (c.lore >= 5) {
                        if (!selectedLores.includes('5+')) return false;
                    } else {
                        if (!selectedLores.includes(c.lore.toString())) return false;
                    }
                }

                if (selectedStrengths.length > 0) {
                    if (c.strength == null) return false;
                    if (c.strength >= 9) {
                        if (!selectedStrengths.includes('9+')) return false;
                    } else {
                        if (!selectedStrengths.includes(c.strength.toString())) return false;
                    }
                }

                if (selectedWillpowers.length > 0) {
                    if (c.willpower == null) return false;
                    if (c.willpower >= 9) {
                        if (!selectedWillpowers.includes('9+')) return false;
                    } else {
                        if (!selectedWillpowers.includes(c.willpower.toString())) return false;
                    }
                }

                if (selectedSets.length > 0) {
                    if (!selectedSets.includes(c.setId)) return false;
                }

                return true;
            });

            displayLimit = 150;
            renderCards(0, displayLimit, true);
        }

        socket.on('state_update', (game) => {
            if (game.gamePhase === 'lobby') {
                showView('lobbyView');
                
                const list = document.getElementById('lobbyPlayers');
                list.innerHTML = '';
                const players = Object.values(game.players);
                players.forEach(p => {
                    const li = document.createElement('li');
                    li.innerHTML = p.avatar ? `<img src="${p.avatar}" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; margin-right: 10px;">${p.name} (Wins: ${p.wins || 0})` : `${p.name} (Wins: ${p.wins || 0})`;
                    list.appendChild(li);
                });

                const btn = document.getElementById('startGameBtn');
                if (players.length >= 2) {
                    btn.disabled = false;
                    btn.innerText = 'Start Game';
                } else {
                    btn.disabled = true;
                    btn.innerText = 'Start Game (Need 2+)';
                }
            } else if (game.gamePhase === 'active') {
                showView('activeView');
                guessedWrongCards.clear();
                
                const topArea = document.getElementById('topArea');
                topArea.innerHTML = '';
                Object.keys(game.players).forEach(id => {
                    if (id === myId) return;
                    const p = game.players[id];
                    const c = game.cards[id];
                    
                    if (p && c) {
                        const div = document.createElement('div');
                        div.className = 'other-player-card';
                        div.innerHTML = `
                            <div class="name">${p.name}'s Card</div>
                            <img src="${c.image_url}" style="margin-top: 10px; width: 140px; border-radius: 8px;">
                            <div style="font-weight: bold; margin-top: 5px;">${c.name}</div>
                            <div style="font-size: 0.8rem; color: var(--text-muted);">${c.title || ''}</div>
                        `;
                        topArea.appendChild(div);
                    }
                });

                filterPlayerCards();
            } else if (game.gamePhase === 'game_over') {
                showView('gameOverView');
                const winnerName = game.players[game.winner] ? game.players[game.winner].name : 'Someone';
                document.getElementById('winnerText').innerText = `${winnerName} won!`;

                const scoreboard = document.getElementById('scoreboardList');
                scoreboard.innerHTML = '<h3 style="margin-bottom: 15px;">Session Scores</h3>';
                Object.values(game.players).sort((a,b) => (b.wins || 0) - (a.wins || 0)).forEach(p => {
                    scoreboard.innerHTML += `<div style="font-size: 1.2rem; margin-bottom: 5px;">${p.name}: ${p.wins || 0} wins</div>`;
                });
            }
        });

        // Global functions need to be on window since this is a module
        window.startGame = startGame;
        window.playAgain = playAgain;
        window.toggleAdvancedFilters = () => {
            const panel = document.getElementById('advancedFiltersPanel');
            const btn = document.getElementById('advancedFiltersBtn');
            if (panel.style.display === 'none') {
                panel.style.display = 'flex';
                btn.innerText = 'Filters ▲';
            } else {
                panel.style.display = 'none';
                btn.innerText = 'Filters ▼';
            }
        };
        window.filterPlayerCards = filterPlayerCards;
        window.copyInviteLink = copyInviteLink;
        window.guessWhoAmICard = guessWhoAmICard;
        window.showTooltip = showTooltip;
        window.moveTooltip = moveTooltip;
        window.hideTooltip = hideTooltip;
    </script>
</body>

</html>
